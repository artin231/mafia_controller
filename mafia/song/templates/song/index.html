{% extends 'base.html' %}
{% load static %}

{% block main %}
<div class="container">
    <form method="post" action="" class="song_player">
        <select name="song" id="select_song">
            {% for i in songs %}
            <option value="{{ i.song.url }}">{{ i.name }}</option>
            {% endfor %}
        </select>
        <audio  class="player" src="{{ song.song.url }}"allow="autoplay" ></audio>
    </form>
</div>
<script src="{% static 'js/script.js' %}"></script>
{% endblock %}
